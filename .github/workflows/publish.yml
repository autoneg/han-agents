name: Publish to PyPI

# Publishes the package to PyPI when a version tag (e.g. v0.0.1) is
# pushed. Uses PyPI Trusted Publishing (OIDC) -- no API token secret is
# needed, but a Trusted Publisher must be configured on PyPI first:
#   PyPI -> project "han-agents" -> Publishing -> add a GitHub publisher
#   with owner=autoneg, repo=han-agents, workflow=publish.yml,
#   environment=pypi. For the very first release, add it as a
#   "pending publisher" before pushing the tag.
#
# Prefer OIDC. To use an API token instead, add a PYPI_API_TOKEN secret
# and pass `password: ${{ secrets.PYPI_API_TOKEN }}` to the publish step.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/han-agents
    permissions:
      id-token: write # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
